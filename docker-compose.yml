services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    expose:
      - "8000"
    volumes:
      - carcierge_data:/app/data
      - carcierge_uploads:/app/uploads
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/carcierge.db}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-prod}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-PartnerPluslogistics@gmail.com}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-Admin@123}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      - LOGIN_RATE_LIMIT_MAX_ATTEMPTS=${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:-5}
      - LOGIN_RATE_LIMIT_WINDOW_MINUTES=${LOGIN_RATE_LIMIT_WINDOW_MINUTES:-15}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  carcierge_data:
  carcierge_uploads:
